<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>OG Image · Do Zero ao SaaS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400&family=Inter+Tight:wght@500;600&family=JetBrains+Mono:wght@500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px;
    background: #0B0B0F;
    color: #F5F1E8;
    font-family: 'Inter Tight', sans-serif;
    background-image:
      radial-gradient(circle at 12% 8%, rgba(232, 184, 74, 0.18) 0%, transparent 45%),
      radial-gradient(circle at 88% 82%, rgba(74, 144, 226, 0.1) 0%, transparent 40%);
    overflow: hidden;
    position: relative;
  }
  .wrap { padding: 70px 80px; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
  .top { display: flex; align-items: center; gap: 16px; }
  .logo {
    width: 56px; height: 56px;
    background: #E8B84A;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: #0B0B0F;
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 36px;
    font-style: italic;
  }
  .brand {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 400;
    letter-spacing: -0.02em;
  }
  .brand em { font-style: italic; color: #E8B84A; font-weight: 300; }

  h1 {
    font-family: 'Fraunces', serif;
    font-size: 86px;
    line-height: 1;
    font-weight: 300;
    letter-spacing: -0.03em;
    margin-top: 50px;
    max-width: 1000px;
  }
  h1 em { font-style: italic; color: #E8B84A; font-weight: 400; }
  h1 s { text-decoration-color: #E86B4A; text-decoration-thickness: 4px; color: #8A8577; }

  .sub {
    font-size: 26px;
    color: #8A8577;
    margin-top: 28px;
    max-width: 980px;
    line-height: 1.4;
  }
  .sub strong { color: #F5F1E8; font-weight: 500; }

  .bottom { display: flex; justify-content: space-between; align-items: flex-end; }
  .badges { display: flex; gap: 16px; }
  .badge {
    background: rgba(232,184,74,0.1);
    color: #E8B84A;
    border: 1px solid rgba(232,184,74,0.3);
    padding: 10px 18px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    letter-spacing: 0.04em;
  }
  .price {
    background: #E8B84A;
    color: #0B0B0F;
    padding: 20px 32px;
    border-radius: 8px;
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 600;
    line-height: 1;
  }
  .price small { font-size: 14px; font-family: 'Inter Tight', sans-serif; font-weight: 500; opacity: 0.7; display: block; margin-top: 4px; letter-spacing: 0.02em; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="logo">O</div>
    <div class="brand">Do Zero ao <em>SaaS</em></div>
  </div>

  <div>
    <h1>Do <em>zero</em> ao seu primeiro<br>SaaS faturando em 30 dias.</h1>
    <p class="sub">Sem queimar <strong>R$300/mês</strong> em Lovable. Com Claude + Cursor + Gemini orquestrados.</p>
  </div>

  <div class="bottom">
    <div class="badges">
      <span class="badge">SEM SABER PROGRAMAR</span>
      <span class="badge">CHAT IA 24/7</span>
      <span class="badge">GARANTIA 7 DIAS</span>
    </div>
    <div class="price">R$ 147<small>OU 12X DE R$ 12,25</small></div>
  </div>
</div>
</body>
</html>
